<h2>Sign up</h2>
<form id="signup-form" hx-post="user_signup/receive/"
   hx-target="#signup-form"
   hx-swap="innerHTML">
   {% csrf_token %} <input type="text" name="email" placeholder="MMU Email" required>
   <br>
   <input type="password" name="password" placeholder="Password" required>
   <br><button type="submit">Submit</button>
</form>
