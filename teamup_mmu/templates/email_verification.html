<div id="email-verification-container">
    <h2>Verify email</h2>
    <button type="submit">Send code again</button>
    <br><form id="email-verification-form" hx-post="email_verification/receive/"
    hx-target="#email-verification-container"
    hx-swap="innerHTML">
    {% csrf_token %} <input type="text" name="code" placeholder="Verification code" required>
    <br><button type="submit">Submit</button>
    </form>
</div>
