<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamUp MMU</title>
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
    <style>
        :root {
            --primary: #4F46E5;
            --secondary: #7c3aed;
            --bg-gradient: linear-gradient(135deg, #1E1B4B, #4C1D95);
        }
        
        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: #ffffff;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            box-sizing: border-box; /* Crucial: stops padding from making the header wider than the screen */
            background: rgba(124, 58, 237, 1);
            color: white;
            z-index: 2;
        }

        nav {
            display: flex;
            justify-content: space-between; /* This pushes the logo and button to opposite sides */
            align-items: center;
            padding: 20px 40px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            text-decoration: none;
            color: white;
            letter-spacing: 1px;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-login {
            border: 2px solid rgba(255, 255, 255, 0.8);
            color: white;
        }

        .btn-login:hover {
            background: white;
            color: var(--primary);
        }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            margin-bottom: 1rem;
            color: rgba(124, 58, 237, 0.9);
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.25rem;
            max-width: 600px;
            margin-bottom: 2.5rem;
            color: rgba(124, 58, 237, 0.9);
            line-height: 1.6;
        }

        .btn-signup {
            background: rgba(124, 58, 237, 1);
            color: white;
            font-size: 1.125rem;
            padding: 1rem 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>



<body>
  <header>
  <nav>
    <a href="{% url 'index' %}" class="logo">TeamUp MMU</a>
    <a href="{% url 'user_login' %}" class="btn btn-login">Log In</a>
    </nav>    
</header>
    <main class="hero">
        <h1>Find Your Perfect Groupmates</h1>
        <p>Skip the hassle of forming groups. Connect with MMU students, combine your skills, and build the ultimate team for your assignments.</p>
        <a href="{% url 'user_signup' %}" class="btn btn-signup">Sign Up Now</a>
    </main>
</body>
</html>
