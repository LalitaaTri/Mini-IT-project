<h2>Log in</h2>
<form id="login-form" hx-post="user_login/receive/"
   hx-target="#login-form"
   hx-swap="innerHTML">
   {% csrf_token %} <input type="text" name="email" placeholder="MMU Email" required>
   <br>
   <input type="password" name="password" placeholder="Password" required>
   <br><button type="submit">Submit</button>
</form>
